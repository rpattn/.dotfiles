# ---------------------------
# FONT
# ---------------------------
font_family      JetBrainsMono Nerd Font
font_size        12.0
disable_ligatures never

allow_remote_control yes
listen_on unix:/tmp/kitty

# Slightly better readability
font_features +calt +liga

# ---------------------------
# WINDOW / UI
# ---------------------------
window_padding_width 8
background_opacity   0.94
hide_window_decorations yes

# subtle blur (works on Wayland compositors like Hyprland)
background_blur 1

# ---------------------------
# TAB BAR (cleaner)
# ---------------------------
tab_bar_edge top
tab_bar_style powerline

active_tab_foreground   #1e1e2e
active_tab_background   #89b4fa

inactive_tab_foreground #6c7086
inactive_tab_background #1e1e2e

tab_bar_margin_height 4 2


# ---------------------------
# CURSOR
# ---------------------------
cursor_shape beam
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# make cursor more visible
cursor #f5e0dc

# ---------------------------
# SCROLLING
# ---------------------------
scrollback_lines 10000
wheel_scroll_multiplier 4.0

# smooth scrolling feel
touch_scroll_multiplier 1.0

# ---------------------------
# PERFORMANCE
# ---------------------------
repaint_delay 8
input_delay 2
sync_to_monitor yes

# ---------------------------
# KEYBINDS
# ---------------------------
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# better tab switching
map ctrl+shift+left previous_tab
map ctrl+shift+right next_tab

# ---------------------------
# UX IMPROVEMENTS
# ---------------------------

# open URLs with ctrl+click
open_url_with default
detect_urls yes

# less visual noise
enable_audio_bell no
visual_bell_duration 0.0

confirm_os_window_close 0

# better selection feel
copy_on_select yes

# ---------------------------
# OPTIONAL (nice with Waybar)
# ---------------------------

# slightly transparent inactive windows
inactive_text_alpha 0.8

include colors.conf
