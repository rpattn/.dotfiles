general {
    grace = 0
    hide_cursor = true
}

background {
    monitor =
    path = ~/wallpaper.jpg
    blur_passes = 2
    blur_size = 8
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2

    outer_color = rgba(0, 0, 0, 0.6)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(255, 255, 255)

    fade_on_empty = false
    placeholder_text = Password...
    hide_input = false
}

label {
    monitor =
    text = $TIME
    font_size = 48
    color = rgb(255, 255, 255)
    position = 0, 200
    halign = center
    valign = center
}
